<!DOCTYPE html>
<html>
<head>
<title>OTP Verification - Smart Health Card</title>
<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background-color: #eef1f5;
}

.header {
    background: #69b36d;
    color: white;
    padding: 18px;
    text-align: center;
    font-size: 28px;
    font-weight: bold;
}

.wrapper {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    height: calc(100vh - 70px);
    padding-top: 100px;
}

.card {
    background: #f7f7f7;
    padding: 40px;
    width: 450px;
    border-radius: 10px;
    box-shadow: 0 3px 8px rgba(0,0,0,0.1);
    text-align: center;
}

.card h2 {
    color: #58a55c;
    margin-bottom: 20px;
    font-size: 28px;
}

.card p {
    color: #555;
    margin-bottom: 20px;
    font-size: 16px;
    background: #e8f0fe;
    padding: 12px;
    border-radius: 6px;
}

.otp-input {
    width: 220px;
    padding: 18px;
    font-size: 34px;
    text-align: center;
    letter-spacing: 14px;
    border-radius: 10px;
    border: 2px solid #69b36d;
    outline: none;
    margin-bottom: 20px;
}

.btn {
    background: #69b36d;
    color: white;
    padding: 12px 30px;
    border: none;
    border-radius: 6px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    margin: 5px;
}

.btn:hover {
    background: #4f9a54;
}

.skip-btn {
    background: #e53935;
}

.skip-btn:hover {
    background: #c62828;
}

.info-text {
    font-size: 14px;
    color: #777;
    margin-top: 20px;
}

.resend-link {
    color: #69b36d;
    text-decoration: none;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="header">Smart Health Card - OTP Verification</div>

<div class="wrapper">
    <div class="card">
        <h2>Verify OTP</h2>

        <p>OTP has been sent to your registered mobile number</p>


        <!-- OTP FORM -->
        <form action="/verify_otp" method="POST">
            <input type="text"
                name="entered_otp"
                placeholder="Enter OTP"
                maxlength="4"
                class="otp-input"
                required>
            <br>

            <button type="submit" class="btn">Verify OTP</button>
        </form>

        <!-- 🚑 SKIP OTP BUTTON -->
        <br>
        <button class="btn skip-btn" onclick="confirmSkip()">
            🚑 Emergency Access (Skip OTP)
        </button>

        <!-- RESEND -->
        <div class="info-text">
            Didn't receive OTP? <a href="/resend_otp" class="resend-link">Resend OTP</a>
        </div>
    </div>
</div>

<script>
function confirmSkip() {
    if (confirm("Are you sure? This will bypass OTP security.")) {
        window.location.href = "/skip_otp";
    }
}
</script>

</body>
</html>
