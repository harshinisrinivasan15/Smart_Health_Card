

<!DOCTYPE html>
<html>
<head>
    <title>Doctor Portal</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #eef1f5;
        }

        .header {
            background: #69b36d;
            color: white;
            padding: 18px;
            text-align: center;
            font-size: 28px;
            font-weight: bold;
        }

        .wrapper {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            height: calc(100vh - 70px);
            padding-top: 80px;
        }

        .card {
            background: #f7f7f7;
            padding: 40px;
            width: 420px;
            border-radius: 10px;
            box-shadow: 0 3px 8px rgba(0,0,0,0.1);
            text-align: center;
        }

        .card h2 {
            color: #58a55c;
            margin-bottom: 25px;
        }

        input[type="email"] {
            width: 90%;
            padding: 10px;
            margin: 15px 0;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        .btn {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 18px;
            background: #69b36d;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }

        .btn:hover {
            background: #4f9a54;
        }
    </style>
</head>

<body>

<div class="header">Smart Health Card - Doctor Portal</div>

<div class="wrapper">
    <div class="card">
        <h2>Doctor Login</h2>

        <form method="POST">
            <input type="email" name="email" placeholder="Enter your email" required>
            <br>
            <button type="submit" class="btn">Login</button>
        </form>

    </div>
</div>

</body>
</html>
