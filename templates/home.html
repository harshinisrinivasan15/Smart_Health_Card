<!DOCTYPE html>
<html>
<head>
    <title>Smart Health Card</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #e9ecef;
        }

        /* Header */
        header {
            background-color: #66bb6a;
            color: white;
            text-align: center;
            padding: 18px;
            font-size: 28px;
            font-weight: bold;
        }

        /* Center container */
        .container {
            width: 85%;
            margin: 50px auto;
            text-align: center;
        }

        h2 {
            margin-bottom: 35px;
        }

        /* Portal cards */
        .card {
            display: inline-block;
            width: 260px;
            background: #f5f5f5;
            padding: 30px;
            margin: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-6px);
        }

        .card a {
            text-decoration: none;
            color: black;
            font-size: 20px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<header>Smart Health Card</header>

<div class="container">

    <h2>Select Portal</h2>

    <div class="card">
        <a href="/admin">🛠️ Admin Portal</a>
    </div>

    <div class="card">
        <a href="/patient_portal">👤 Patient Portal</a>
    </div>

    <div class="card">
        <a href="/doctor_portal">🩺 Doctor Portal</a>
    </div>

</div>

</body>
</html>
